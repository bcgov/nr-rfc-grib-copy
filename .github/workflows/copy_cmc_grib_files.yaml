name: Download and Process CMC Grib2 Files

on:
  # push:
  #   branches:
  #     - "feat/daily-grib2-download"
  # cron schedules are in UTC
  # this job should run at 5.31 am pst, which translates to 1.31 pm.
  schedule:
    - cron: '45 12 * * *'
  workflow_dispatch:
    inputs:
      manual_date:
        description: 'Target Date (Format: YYYYMMDD). Leave blank for today.'
        required: false
        default: ''
  repository_dispatch:
    types: run-cmc-grib-download

jobs:
  dl_cansip_grib2:
    defaults:
      run:
        shell: bash
    name: 'Download and Process CMC Grib2 Files'
    runs-on: ubuntu-22.04
    environment: RUN
    env:
      OBJ_STORE_BUCKET: ${{ secrets.OBJ_STORE_BUCKET }}
      OBJ_STORE_SECRET: ${{ secrets.OBJ_STORE_SECRET }}
      OBJ_STORE_USER: ${{ secrets.OBJ_STORE_USER }}
      OBJ_STORE_HOST: ${{ secrets.OBJ_STORE_HOST }}
      WGRIB_UTILITY: /usr/local/bin/wgrib2

    steps:
    - uses: actions/checkout@v6
      id: checkout
      with:
       fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - id: install_dependencies
      name: install python dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - id: get_wgrib_2
      name: get the wgrib2 binary
      shell: bash
      run: |
        curl -o wgrib2 -L https://github.com/franTarkenton/wgrib2-Cygwin-Build/releases/download/20230203-0000/wgrib2
        chmod +x wgrib2
        mv wgrib2 $WGRIB_UTILITY

    - id: download_cmc_grib
      name: download grib files
      shell: bash
      env:
        MANUAL_DATE: ${{ github.event.inputs.manual_date }}
        RUN_STARTED: ${{ github.run_started_at }}
        PAYLOAD_DATE: ${{ github.event.client_payload.idem_key }}
      run: |
        # Parse the original run date (YYYYMMDD) as the baseline default
        FALLBACK_DATE=$(echo "${RUN_STARTED:0:10}" | tr -d '-')
        echo "Fallback date (from run start): $FALLBACK_DATE"

        # Use Manual UI input if typed; otherwise, fall back to the original run date
        if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$MANUAL_DATE" ]; then
          echo "Triggered manually via UI."
          TARGET_DATE="$MANUAL_DATE"
        else
          TARGET_DATE="$FALLBACK_DATE"
        fi

        # FIX: Put the dash at the very end of the set so tr knows it is a literal character, not a range
        TARGET_DATE=$(echo "$TARGET_DATE" | tr -d '/ -')
        if [ -z "$TARGET_DATE" ]; then
          echo "Target date was left empty or invalid. Using fallback date."
          TARGET_DATE="$FALLBACK_DATE"
        fi

        echo "Processing target date: $TARGET_DATE"

        # Execute the python script
        python scripts/src/main_cmc.py "$TARGET_DATE"

    # - id: debug
    #   name: debug and list files
    #   shell: bash
    #   run: |
    #     ls -la
